spring.application.name=kosmo_react

# Server Configuration
server.port=8082

# PostgreSQL Database Configuration (Bound to .env Environment Variables)
spring.datasource.hikari.username=${DB_USERNAME}
spring.datasource.hikari.password=${DB_PASSWORD}
spring.datasource.url=${DB_URL}&prepareThreshold=0
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable Prepared Statement Caching for PgBouncer
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.useServerPrepStmts=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# File Upload Configuration (Mapped to .env)
app.upload.base-dir=${UPLOAD_BASE_DIR:C:/upload}
app.upload.sub-dirs.members=members
app.upload.sub-dirs.boards=boards
app.upload.sub-dirs.notices=notices
